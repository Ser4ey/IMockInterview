services:
  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ${IMOCK_ENV_FILE:-./.env.prod}
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/imock.db
    volumes:
      - imock_sqlite_data:/app/data

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  imock_sqlite_data:

# Запуск
# docker compose -f docker-compose.cloud.yaml --env-file .env.cloud pull
# docker compose -f docker-compose.cloud.yaml --env-file .env.cloud up -d

# Пересобрать
# docker compose -f docker-compose.cloud.yaml --env-file .env.prod down -v
# docker compose -f docker-compose.cloud.yaml --env-file .env.prod up -d