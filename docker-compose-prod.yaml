services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: imock-backend:prod
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ${IMOCK_ENV_FILE:-./.env.prod}
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/imock.db
    volumes:
      - imock_sqlite_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: imock-frontend:prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  imock_sqlite_data:


